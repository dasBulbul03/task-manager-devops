# ========================================
# CI/CD Pipeline for Task Manager
# ========================================

name: Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Environment variables
env:
  DOCKER_IMAGE_NAME: task-manager
  DOCKER_CONTAINER_NAME: task-app
  EC2_SSH_USER: ec2-user

jobs:
  # ========================================
  # Build and Test
  # ========================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Set up Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      # Build with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      # Run tests
      - name: Run tests
        run: mvn test

  # ========================================
  # Build and Push Docker Image
  # ========================================
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # Extract metadata
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest
      
      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Deploy to EC2
  # ========================================
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Add SSH key
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY' > ~/.ssh/id_rsa
import os
import base64
key = os.environ['EC2_SSH_KEY']
if '\\n' in key and '-----BEGIN' not in key:
    key = key.replace('\\n', '\n')
key = key.replace('\r\n', '\n').replace('\r', '\n')
if '-----BEGIN' not in key:
    try:
        decoded = base64.b64decode(key)
        if b'PRIVATE KEY' in decoded:
            key = decoded.decode('utf-8')
    except Exception:
        pass
print(key, end='')
PY
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -lf ~/.ssh/id_rsa
      
      # Update known hosts
      - name: Update known hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      
      # Wait for EC2 to be ready
      - name: Wait for EC2
        run: |
          echo "Waiting for EC2 to be ready..."
          sleep 30
      
      # SSH and deploy
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no ${{ env.EC2_SSH_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            docker stop ${{ env.DOCKER_CONTAINER_NAME }} || true
            docker rm ${{ env.DOCKER_CONTAINER_NAME }} || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest

            docker run -d \
              --name ${{ env.DOCKER_CONTAINER_NAME }} \
              -p 8080:8080 \
              ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest

            docker ps
          EOF
      
      # Verify deployment
      - name: Verify deployment
        run: |
          echo "Waiting for application to start..."
          sleep 15
          curl -f http://${{ secrets.EC2_HOST }}:8080/actuator/health || exit 1
          echo "Deployment successful!"